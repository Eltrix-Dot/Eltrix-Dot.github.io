<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Eltrix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 480px;
        }

        .code {
            font-size: 7rem;
            font-weight: 900;
            color: #007bff;
            letter-spacing: -4px;
            line-height: 1;
            animation: fadeUp 0.6s ease both;
        }

        .divider {
            width: 48px;
            height: 4px;
            background: #007bff;
            border-radius: 2px;
            margin: 24px auto;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            animation: fadeUp 0.6s 0.15s ease both;
        }

        p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 32px;
            animation: fadeUp 0.6s 0.2s ease both;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 0.6s 0.25s ease both;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary {
            background: #007bff;
            color: #fff;
        }

        .btn-secondary {
            background: #fff;
            color: #007bff;
            border: 2px solid #007bff;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 123, 255, 0.2);
        }

        .brand {
            margin-top: 48px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #ccc;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: fadeUp 0.6s 0.3s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="code">404</div>
        <div class="divider"></div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>

        <div class="actions">
            <a href="https://eltrix-dot.github.io/" class="btn btn-primary">Go Home</a>
            <a href="https://eltrix-dot.github.io/privacymain" class="btn btn-secondary">Privacy Hub</a>
        </div>

        <div class="brand">Eltrix</div>
    </div>

</body>
</html>
